<svg xmlns="http://www.w3.org/2000/svg" width="200" height="50" viewBox="0 0 200 50">
  <!-- 背景矩形 -->
  <rect width="200" height="50" rx="25" fill="#9B59B6"/>
  
  <!-- 装饰元素 - 冥想符号 -->
  <circle cx="40" cy="25" r="8" fill="white" opacity="0.8"/>
  <line x1="40" y1="12" x2="40" y2="18" stroke="white" stroke-width="2"/>
  <line x1="35" y1="15" x2="45" y2="15" stroke="white" stroke-width="2"/>
  
  <!-- 文字 -->
  <text x="100" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
    Laosia下班冥想中
